version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: ats-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodb_data:/data/db
    networks:
      - ats-network

  ml-service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: ats-ml-service
    ports:
      - "8000:8000"
    environment:
      - ML_SERVICE_PORT=8000
      - ML_SERVICE_RELOAD=true
    depends_on:
      - mongodb
    networks:
      - ats-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ats-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/ats-resume-scorer?authSource=admin
      - ML_SERVICE_URL=http://ml-service:8000
      - NODE_ENV=development
    depends_on:
      - mongodb
      - ml-service
    networks:
      - ats-network

volumes:
  mongodb_data:

networks:
  ats-network:
    driver: bridge
